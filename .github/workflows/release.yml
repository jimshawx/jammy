name: Manual Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release ID for latest-build
        id: get_release
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            | jq '.[] | select(.tag_name=="latest-build") | .id')
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Download draft release assets
        uses: robinraju/release-downloader@v1.8
        with:
          releaseId: ${{ steps.get_release.outputs.release_id }}
          fileName: "*"
          out-file-path: ./downloads
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename files with run number
        run: |
          mv ./downloads/Jammy-windows.zip ./downloads/Jammy-0.0.${{ github.run_number }}-alpha-windows-x64.zip
          mv ./downloads/Jammy-linux.tar.gz ./downloads/Jammy-0.0.${{ github.run_number }}-alpha-linux-x64.tar.gz

      - name: Create Windows Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-${{ github.run_number }}
          name: Jammy Windows Alpha Release 0.0.${{ github.run_number }}
          files: ./downloads/Jammy-0.0.${{ github.run_number }}-alpha-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Linux Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: linux-${{ github.run_number }}
          name: Jammy Linux Alpha Release 0.0.${{ github.run_number }}
          files: ./downloads/Jammy-0.0.${{ github.run_number }}-alpha-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
