name: Manual Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Jammy-windows
          path: ./artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Jammy-linux
          path: ./artifacts

      - name: Create Windows Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-${{ github.run_number }}
          name: Jammy Windows Release ${{ github.run_number }}
          files: ./artifacts/Jammy-0.0.1-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Linux Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: linux-${{ github.run_number }}
          name: Jammy Linux Release ${{ github.run_number }}
          files: ./artifacts/Jammy-0.0.1-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
