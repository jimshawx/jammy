name: Weekly Multi-Platform Build

on:
  schedule:
    - cron: '0 0 * * MON'   # every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.3'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Windows
        run: dotnet build Jammy.Main --configuration Release --no-restore

      - name: Build Linux
        run: dotnet build Jammy.Main.Linux --configuration Release --no-restore

      # Publish Windows binary (Jammy.Main)
      - name: Publish Windows binary
        run: dotnet publish Jammy.Main -c Release -r win-x64 -o out/win --self-contained true /p:EnableWindowsTargeting=true

      # Zip Windows binary
      - name: Zip Windows binary
        run: |
          Copy-Item -Path "games" -Destination "out/win/games" -Recurse
          Copy-Item -Path "roms" -Destination "out/win/roms" -Recurse
          Compress-Archive -Path out/win/* -DestinationPath Jammy-windows.zip

      # Upload Windows artifact
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jammy-windows
          path: Jammy-windows.zip

      # Publish Linux binary (Jammy.Main.Linux)
      - name: Publish Linux binary
        run: dotnet publish Jammy.Main.Linux -c Release -r linux-x64 -o out/linux --self-contained true

      # Zip Linux binary
      - name: Zip Linux binary
        run: |
          Copy-Item -Path "games" -Destination "out/linux/games" -Recurse
          Copy-Item -Path "roms" -Destination "out/linux/roms" -Recurse
          Compress-Archive -Path out/linux/* -DestinationPath Jammy-linux.zip

      # Upload Linux artifact
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jammy-linux
          path: Jammy-linux.zip

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest Build (Draft)
          draft: true
          prerelease: true
          files: |
            Jammy-windows.zip
            Jammy-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
